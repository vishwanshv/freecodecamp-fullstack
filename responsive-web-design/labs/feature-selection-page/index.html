<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Selection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Feature Selection</h1>

  <div class="feature-card-container">

    <label class="feature-card">
      <input type="checkbox">
      <h2>Cloud Storage</h2>
      <p>100 GB secure storage</p>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <h2>Dedicated Support</h2>
      <p>24/7 customer support</p>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <h2>Advanced Analytics</h2>
      <p>Insights and reports</p>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <h2>Custom User Themes</h2>
      <p>Personalized dashboard design</p>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <h2>Multi-User Collaboration</h2>
      <p>Team access and sharing</p>
    </label>

    <label class="feature-card">
      <input type="checkbox">
      <h2>API Access</h2>
      <p>Integrate with your custom built tools</p>
    </label>

  </div>

</body>
</html>
