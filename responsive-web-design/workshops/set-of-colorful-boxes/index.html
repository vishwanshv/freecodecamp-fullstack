<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colored Boxes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Colored Boxes Layout</h1>
  </header>
  <div class="flex-container">
    <div class="box box1">
      <h2>Box 1</h2>
      <p>Red</p>
    </div>
    <div class="box box2">
      <h2>Box 2</h2>
      <p>Orange</p>
    </div>
    <div class="box box3">
      <h2>Box 3</h2>
      <p>Yellow</p>
    </div>
    <div class="box box4">
      <h2>Box 4</h2>
      <p>Green</p>
    </div>
    <div class="box box5">
      <h2>Box 5</h2>
      <p>Blue</p>
    </div>
    <div class="box box6">
      <h2>Box 6</h2>
      <p>Indigo</p>
    </div>
  </div>
</body>
</html>
